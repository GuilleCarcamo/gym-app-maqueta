<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - GymApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm d-none d-lg-block">
    <div class="container px-0">
      <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-barbell me-2"></i>GymApp</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="rutinas.html"><i class="bi bi-list-task me-1"></i> Rutinas</a></li>
          <li class="nav-item"><a class="nav-link" href="turnos.html"><i class="bi bi-calendar-check me-1"></i> Turnos</a></li>
          <li class="nav-item"><a class="nav-link active" href="cliente.html"><i class="bi bi-person me-1"></i> Perfil</a></li>
          <li class="nav-item ms-lg-3"><a class="nav-link text-danger" href="#"><i class="bi bi-box-arrow-right me-1"></i> Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="bg-primary text-white py-3 d-lg-none sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center px-3">
      <h1 class="fs-5 fw-bold mb-0"><i class="bi bi-person me-2"></i>Perfil</h1>
      <button class="btn btn-sm btn-outline-light border-0"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </header>

  <main class="container px-3 px-lg-0 py-3 pb-lg-5">
    <!-- Perfil Header -->
    <div class="card border-0 shadow-sm rounded-3 mb-3">
      <div class="card-body text-center py-4">
        <div class="position-relative d-inline-block">
          <img src="https://ui-avatars.com/api/?name=Juan+Perez&size=96&background=0D6EFD&color=fff" class="rounded-circle border border-3 border-white shadow-sm">
          <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle p-2" style="width:32px;height:32px" disabled>
            <i class="bi bi-camera small"></i>
          </button>
        </div>
        <h5 class="fw-bold mt-2 mb-1">Juan Pérez</h5>
        <p class="text-muted small mb-2">juan.perez@email.com</p>
        <span class="badge bg-success bg-opacity-10 text-success px-3 py-2">Miembro Activo</span>
      </div>
    </div>

    <div class="row g-3">
      <!-- Columna Izquierda: Estadísticas y Membresía -->
      <div class="col-12 col-lg-8">
        <div class="row g-2 mb-3">
          <div class="col-4">
            <div class="bg-white rounded-3 p-3 text-center shadow-sm card-hover">
              <i class="bi bi-calendar-check fs-4 text-primary"></i>
              <div class="fw-bold fs-5">24</div><small class="text-muted">Turnos</small>
            </div>
          </div>
          <div class="col-4">
            <div class="bg-white rounded-3 p-3 text-center shadow-sm card-hover">
              <i class="bi bi-dumbbell fs-4 text-success"></i>
              <div class="fw-bold fs-5">8</div><small class="text-muted">Rutinas</small>
            </div>
          </div>
          <div class="col-4">
            <div class="bg-white rounded-3 p-3 text-center shadow-sm card-hover">
              <i class="bi bi-fire fs-4 text-warning"></i>
              <div class="fw-bold fs-5">1.2k</div><small class="text-muted">Kcal</small>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-3 card-hover">
          <div class="card-body p-3">
            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-credit-card fs-4 text-primary me-3"></i>
              <div class="flex-grow-1">
                <h6 class="fw-bold mb-1">Plan Premium</h6>
                <p class="text-muted small mb-1">Renovación: 30/04/2026</p>
                <div class="progress" style="height:6px"><div class="progress-bar bg-success" style="width:75%"></div></div>
              </div>
            </div>
            <button class="btn btn-outline-primary btn-sm w-100" disabled>Ver historial de pagos</button>
          </div>
        </div>
      </div>

      <!-- Columna Derecha: Configuración -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-header bg-white border-0 py-3">
            <h6 class="mb-0 fw-bold"><i class="bi bi-gear me-2 text-muted"></i>Configuración</h6>
          </div>
          <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action border-0 d-flex justify-content-between py-3" disabled>
              <span><i class="bi bi-bell me-3 text-muted"></i>Notificaciones</span><i class="bi bi-chevron-right text-muted"></i>
            </a>
            <a href="#" class="list-group-item list-group-item-action border-0 d-flex justify-content-between py-3" disabled>
              <span><i class="bi bi-shield-lock me-3 text-muted"></i>Seguridad</span><i class="bi bi-chevron-right text-muted"></i>
            </a>
            <a href="#" class="list-group-item list-group-item-action border-0 d-flex justify-content-between py-3 text-danger" disabled>
              <span><i class="bi bi-trash me-3"></i>Eliminar cuenta</span><i class="bi bi-chevron-right"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="fixed-bottom bg-white border-top d-lg-none d-flex justify-content-around py-2 pb-3 shadow-lg">
    <a href="rutinas.html" class="nav-link text-center text-decoration-none text-muted"><i class="bi bi-list-task fs-5"></i><small>Rutinas</small></a>
    <a href="turnos.html" class="nav-link text-center text-decoration-none text-muted"><i class="bi bi-calendar-check fs-5"></i><small>Turnos</small></a>
    <a href="cliente.html" class="nav-link text-center text-decoration-none active-nav"><i class="bi bi-person fs-5"></i><small>Perfil</small></a>
  </nav>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { requireAuth } from '/js/guards.js';
    requireAuth();
  </script>
</body>
</html>
