<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - GymApp</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./css/responsive.css" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
      min-height: 100vh;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .login-card .card-body { padding: 2rem; }
    .brand-icon {
      font-size: 3rem;
      color: #0d6efd;
      margin-bottom: 0.5rem;
    }
    .form-control:focus {
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      border-color: #0d6efd;
    }
    .btn-login {
      padding: 0.75rem;
      font-weight: 600;
      transition: transform 0.1s;
    }
    .btn-login:active { transform: scale(0.98); }
    .error-alert {
      animation: shake 0.3s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body class="bg-dashboard d-flex bg-light justify-content-center align-items-center p-3">

  <div class="card login-card bg-white">
    <div class="card-body text-center">
      <!-- Logo / Brand -->
      <i class="bi bi-barbell brand-icon"></i>
      <h3 class="fw-bold mb-1">GymApp</h3>
      <p class="text-muted small mb-4">Ingresa para continuar</p>

      <!-- Formulario -->
      <form id="loginForm" class="text-start">
        <div class="mb-3">
          <label for="user" class="form-label small fw-semibold">Usuario</label>
          <input type="text" id="user" class="form-control" placeholder="ej: admin" required autocomplete="username">
        </div>
        <div class="mb-4">
          <label for="pass" class="form-label small fw-semibold">Contraseña</label>
          <input type="password" id="pass" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <!-- Alerta de error (oculta por defecto) -->
        <div id="errorAlert" class="alert alert-danger small py-2 mb-3 d-none error-alert" role="alert">
          <i class="bi bi-exclamation-triangle me-1"></i>
          <span id="errorMsg">Credenciales incorrectas</span>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary w-100 btn-login">
          <span id="btnText">Ingresar</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </form>

      <!-- Demo credentials hint -->
      <div class="mt-4 pt-3 border-top">
        <small class="text-muted d-block mb-1">Cuentas de prueba:</small>
        <code class="small bg-light px-2 py-1 rounded">admin / 1234</code>
        <code class="small bg-light px-2 py-1 rounded ms-2">cliente / 1234</code>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, getUser } from './js/auth.js';

    // ✅ Si ya está logueado, redirigir inmediatamente
    const currentUser = getUser();
    if (currentUser?.username) {
      window.location.href = "./pages/dashboard.html";
    }

    const form = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMsg = document.getElementById('errorMsg');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // UI: Estado de carga
      loginBtn.disabled = true;
      btnText.textContent = 'Verificando...';
      btnSpinner.classList.remove('d-none');
      errorAlert.classList.add('d-none');

      // Simular pequeño delay para mejor UX (opcional)
      await new Promise(resolve => setTimeout(resolve, 300));

      const username = document.getElementById('user').value.trim();
      const password = document.getElementById('pass').value;

      try {
        const success = login(username, password);
        
        if (success) {
          // ✅ Login exitoso → pages/Dashboard.html
          window.location.href = "./pages/dashboard.html";
        } else {
          // ❌ Error: mostrar mensaje
          showError('Usuario o contraseña incorrectos');
        }
      } catch (err) {
        console.error('Error en login:', err);
        showError('Ocurrió un error. Intenta nuevamente.');
      } finally {
        // Restaurar botón
        loginBtn.disabled = false;
        btnText.textContent = 'Ingresar';
        btnSpinner.classList.add('d-none');
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorAlert.classList.remove('d-none');
      // Enfocar el campo usuario para corregir rápido
      document.getElementById('user').focus();
      document.getElementById('user').select();
    }

    // Permitir Enter en el campo password para enviar
    document.getElementById('pass').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') form.requestSubmit();
    });
  </script>
</body>
</html>
