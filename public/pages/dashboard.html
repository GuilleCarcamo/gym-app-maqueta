<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Gym App</span>
    <button id="logoutBtn" class="btn btn-danger">Salir</button>
  </nav>

  <!-- CONTENIDO -->
  <div class="container mt-4">
    <h1 class="mb-4">Dashboard 💪</h1>

    <!-- MENÚ DINÁMICO -->
    <div id="menu" class="row"></div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { requireAuth } from '../js/guards.js';
    import { logout, getUser } from '../js/auth.js';

    // 🔒 proteger acceso
    requireAuth();

    // 👤 obtener usuario
    const user = getUser();
    const menu = document.getElementById("menu");

    let opciones = [];

    // 👑 ADMIN
    if (user.role === "admin") {
      opciones = [
        { nombre: "Rutinas", link: "rutinas.html", color: "primary" },
        { nombre: "Turnos", link: "turnos.html", color: "success" },
        { nombre: "Pagos", link: "pagos.html", color: "warning" },
        { nombre: "Clientes", link: "cliente.html", color: "info" },
        { nombre: "Tienda", link: "tienda.html", color: "secondary" }
      ];
    }

    // 🙋 CLIENTE
    if (user.role === "cliente") {
      opciones = [
        { nombre: "Mis Rutinas", link: "rutinas.html", color: "primary" },
        { nombre: "Mis Turnos", link: "turnos.html", color: "success" }
      ];
    }

    // 🎯 renderizar botones
    opciones.forEach(op => {
      menu.innerHTML += `
        <div class="col-md-4 mb-3">
          <a href="${op.link}" class="btn btn-${op.color} w-100">
            ${op.nombre}
          </a>
        </div>
      `;
    });

    // 🚪 logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      logout();
      window.location.href = "../login.html";
    });
  </script>

</body>
</html>
