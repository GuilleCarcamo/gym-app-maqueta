<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Rutinas - GymApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
</head>
<body class="bg-light bg-admin">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm d-none d-lg-block">
    <div class="container px-0">
      <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-barbell me-2"></i>GymApp</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="rutinas.html">Rutinas</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin-rutinas.html">Gestión</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-clientes.html">Clientes</a></li>
          <li class="nav-item ms-lg-3"><button id="logoutBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i> Salir</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="bg-primary text-white py-3 d-lg-none sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center px-3">
      <h1 class="fs-5 fw-bold mb-0"><i class="bi bi-clipboard-data me-2"></i>Gestión Rutinas</h1>
      <button id="logoutBtn" class="btn btn-sm btn-outline-light border-0"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </header>

  <main class="container px-3 px-lg-0 py-3 pb-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h5 class="fw-bold mb-0">Rutinas del Sistema</h5>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCrearRutina"><i class="bi bi-plus-lg me-1"></i> Nueva Rutina</button>
    </div>

    <div class="row g-3" id="listaRutinas">
      <!-- Ejemplo 1 -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm card-hover">
          <div class="card-body p-3">
            <div class="d-flex justify-content-between mb-2"><h6 class="fw-bold mb-0">Torso Intermedio</h6><span class="badge bg-primary">Activa</span></div>
            <p class="text-muted small mb-2">Pecho, espalda, hombros. 45 min.</p>
            <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
              <small class="text-muted">Asignada a: 12 clientes</small>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalAsignar"><i class="bi bi-person-plus"></i></button>
                <button class="btn btn-outline-primary"><i class="bi bi-pencil"></i></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="fixed-bottom bg-white border-top d-lg-none d-flex justify-content-around py-2 pb-3 shadow-lg">
    <a href="rutinas.html" class="nav-link text-center text-decoration-none text-muted"><i class="bi bi-list-task fs-5"></i><small>Rutinas</small></a>
    <a href="admin-rutinas.html" class="nav-link text-center text-decoration-none active-nav"><i class="bi bi-clipboard-data fs-5"></i><small>Gestión</small></a>
    <a href="admin-clientes.html" class="nav-link text-center text-decoration-none text-muted"><i class="bi bi-people fs-5"></i><small>Clientes</small></a>
  </nav>

  <!-- Modal Crear -->
  <div class="modal fade" id="modalCrearRutina" tabindex="-1"><div class="modal-dialog modal-lg modal-fullscreen-sm-down"><div class="modal-content rounded-4 border-0">
    <div class="modal-header"><h5 class="modal-title fw-bold">Nueva Rutina</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body px-3 px-lg-4">
      <div class="mb-3"><label class="form-label fw-semibold">Nombre</label><input type="text" class="form-control" placeholder="Ej: Piernas Avanzado"></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label fw-semibold">Categoría</label><select class="form-select"><option>Fuerza</option><option>Cardio</option><option>HIIT</option></select></div>
        <div class="col-6"><label class="form-label fw-semibold">Nivel</label><select class="form-select"><option>Principiante</option><option>Intermedio</option><option>Avanzado</option></select></div>
      </div>
      <div class="mb-3"><label class="form-label fw-semibold">Ejercicios</label><textarea class="form-control" rows="4" placeholder="Formato libre o JSON para Firestore..."></textarea></div>
    </div>
    <div class="modal-footer border-0 pt-0"><button class="btn btn-secondary flex-fill" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-success flex-fill ms-2" disabled>Guardar</button></div>
  </div></div></div>

  <!-- Modal Asignar -->
  <div class="modal fade" id="modalAsignar" tabindex="-1"><div class="modal-dialog modal-fullscreen-sm-down"><div class="modal-content rounded-4 border-0">
    <div class="modal-header"><h5 class="modal-title fw-bold">Asignar Rutina</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body px-3 px-lg-4">
      <div class="mb-3"><label class="form-label fw-semibold">Seleccionar Clientes</label><div class="form-check"><input class="form-check-input" type="checkbox" id="c1" checked><label class="form-check-label" for="c1">Juan Pérez</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="c2"><label class="form-check-label" for="c2">María López</label></div></div>
      <div class="alert alert-info small mb-0"><i class="bi bi-info-circle me-1"></i> Se notificará a los clientes al confirmar.</div>
    </div>
    <div class="modal-footer border-0 pt-0"><button class="btn btn-secondary flex-fill" data-bs-dismiss="modal">Cerrar</button><button class="btn btn-primary flex-fill ms-2" disabled>Asignar</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { requireRole } from '../js/guards.js';
    import { logout } from '../js/auth.js';
    requireRole('admin');
    document.getElementById('logoutBtn').addEventListener('click', () => { logout(); window.location.href = '../login.html'; });
  </script>
</body>
</html>
