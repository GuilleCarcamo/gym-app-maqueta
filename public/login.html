<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center mb-3">Gym App 💪</h3>

    <input type="text" id="user" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Contraseña">

    <button id="loginBtn" class="btn btn-primary w-100">Ingresar</button>
  </div>

  <script type="module">
    import { login, getUser } from './js/auth.js';

    // Evitar volver al login si ya está logueado
    const user = getUser();
    if (user) {
      window.location.href = "pages/dashboard.html";
    }

    document.getElementById("loginBtn").addEventListener("click", () => {
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      if (login(user, pass)) {
        window.location.href = "pages/dashboard.html";
      } else {
        alert("Credenciales incorrectas");
      }
    });
  </script>

</body>
</html>
